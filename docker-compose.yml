services:
  d-max:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_PATH: /app/data/dmax.sqlite
      DMAX_API_PORT: 3088
      DMAX_WEB_DIST_DIR: /app/dist-web
      DMAX_SCHEMA_PATH: /app/schema.sql
      DMAX_MEDIA_STORAGE_DIR: /app/data/media
      DMAX_OPENCLAW_CONFIG_PATH: /app/openclaw/config.production.json
      DMAX_OPENCLAW_STATE_DIR: /app/data/openclaw-web-state
      GOOGLE_CALENDAR_TOKEN_PATH: /app/data/google-calendar-oauth.json
    ports:
      - "127.0.0.1:${DMAX_HOST_PORT:-49415}:3088"
    volumes:
      - dmax-data:/app/data
      # Holds Codex ChatGPT OAuth tokens; never bake /root/.codex into the image.
      - dmax-codex-auth:/root/.codex
    restart: unless-stopped

volumes:
  dmax-data:
  dmax-codex-auth:
