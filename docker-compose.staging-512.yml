services:
  dmax-api:
    build:
      context: .
      args:
        OPENCLAW_VERSION: 2026.5.12
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_PATH: /app/data/dmax.sqlite
      DMAX_API_PORT: 3088
      DMAX_WEB_DIST_DIR: /app/dist-web
      DMAX_SCHEMA_PATH: /app/schema.sql
      DMAX_MEDIA_STORAGE_DIR: /app/data/media
      DMAX_OPENCLAW_GATEWAY_URL: http://dmax-openclaw:18789
      DMAX_OPENCLAW_CONFIG_PATH: /app/openclaw/config.staging-512.json
      DMAX_OPENCLAW_STATE_DIR: /app/openclaw-state
      DMAX_OPENCLAW_CLIENT_STATE_DIR: /app/data/openclaw-client-state
      DMAX_OPENCLAW_MODEL: openai/gpt-5.5
      DMAX_INTERNAL_TOOL_TOKEN: ${DMAX_INTERNAL_TOOL_TOKEN:?set DMAX_INTERNAL_TOOL_TOKEN for staging}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:?set OPENCLAW_GATEWAY_TOKEN for staging}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: "1"
      GOOGLE_CALENDAR_TOKEN_PATH: /app/data/google-calendar-oauth.json
    command: ["npm", "run", "api:prod"]
    ports:
      - "127.0.0.1:${DMAX_STAGING_HOST_PORT:-49432}:3088"
    volumes:
      - dmax-staging-data:/app/data
      - dmax-staging-openclaw-state:/app/openclaw-state:ro
    depends_on:
      dmax-openclaw:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3088/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: "no"

  dmax-openclaw:
    build:
      context: .
      args:
        OPENCLAW_VERSION: 2026.5.12
    environment:
      NODE_ENV: production
      OPENCLAW_CONFIG_PATH: /app/openclaw/config.staging-512.json
      OPENCLAW_STATE_DIR: /app/data/openclaw-state
      OPENCLAW_DISABLE_BONJOUR: "1"
      DMAX_TOOL_ENDPOINT_URL: http://dmax-api:3088/internal/openclaw/tools
      DMAX_INTERNAL_TOOL_TOKEN: ${DMAX_INTERNAL_TOOL_TOKEN:?set DMAX_INTERNAL_TOOL_TOKEN for staging}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN:?set OPENCLAW_GATEWAY_TOKEN for staging}
    command:
      - sh
      - -lc
      - |
        CODEX_PLUGIN_DIR="$$OPENCLAW_STATE_DIR/npm/node_modules/@openclaw/codex"
        if ! node -e "const fs=require('fs'); const p='$$CODEX_PLUGIN_DIR/package.json'; process.exit(fs.existsSync(p) && JSON.parse(fs.readFileSync(p,'utf8')).version === '2026.5.12' ? 0 : 1)"; then
          rm -rf "$$CODEX_PLUGIN_DIR"
          mkdir -p "$$(dirname "$$CODEX_PLUGIN_DIR")" "$$OPENCLAW_STATE_DIR/npm/node_modules"
          cp -a /usr/local/lib/node_modules/@openclaw/codex "$$CODEX_PLUGIN_DIR"
          ln -sfn /usr/local/lib/node_modules/openclaw "$$OPENCLAW_STATE_DIR/npm/node_modules/openclaw"
        fi
        exec openclaw gateway run --force --port 18789 --auth token --bind lan
    expose:
      - "18789"
    volumes:
      - dmax-staging-openclaw-state:/app/data/openclaw-state
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const net=require('node:net'); const s=net.connect(18789,'127.0.0.1',()=>process.exit(0)); s.on('error',()=>process.exit(1)); setTimeout(()=>process.exit(1),1000)\""]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: "no"

volumes:
  dmax-staging-data:
  dmax-staging-openclaw-state:
